name: PM Followup

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue:
        description: "Issue number — quota-recovery resume entrypoint"
        required: false
      pr:
        description: "Unused for this stage (kept uniform across agent workflows)"
        required: false
      comment_body:
        description: "The triggering comment body to replay on resume"
        required: false

jobs:
  pm-followup:
    # Cheap inline pre-filter; authoritative author/allowlist check is the
    # Authorize step below. Only comments on issues (not PRs), not from the bot,
    # not /approved (that is dev-implement), not the // discuss escape hatch.
    # workflow_dispatch is the quota-recovery resume entrypoint: pre-authorized
    # and bypasses the AGENTS_FREEZE gate.
    if: |
      github.repository == 'MishaMgla/opencraft1' &&
      vars.AGENTS_FREEZE != 'true' &&
      (
        github.event_name == 'workflow_dispatch' ||
        (
          vars.AGENTS_QUOTA_FREEZE != 'true' &&
          github.event.issue.pull_request == null &&
          github.event.comment.user.login != 'github-actions[bot]' &&
          !contains(github.event.comment.body, '<!-- agent-bot -->') &&
          !startsWith(github.event.comment.body, '/approved') &&
          !startsWith(github.event.comment.body, '//') &&
          !contains(github.event.issue.labels.*.name, 'pm:skip')
        )
      )
    runs-on: [self-hosted]
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Authorize
        id: auth
        if: github.event_name != 'workflow_dispatch'
        env:
          ACTOR: ${{ github.event.comment.user.login }}
          OWNER_ISSUE: ${{ github.event.issue.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: .github/scripts/authorize.sh

      - name: Reject unauthorized commenter
        if: github.event_name != 'workflow_dispatch' && steps.auth.outputs.authorized != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --body "🤖 Only a maintainer with write access (or an allowlisted maintainer) can steer this issue's agent. Ignoring this comment.
          <sub>🤖 PM · auth</sub><!-- agent-bot -->"

      # Normalize trigger: issue number + effective authorization. The resume
      # (workflow_dispatch) path is pre-authorized.
      - name: Resolve context
        id: ctx
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ISSUE="${{ inputs.issue }}"
            [ -n "$ISSUE" ] || { echo "resume requires an 'issue' input; aborting." >&2; exit 1; }
            echo "issue=$ISSUE" >> "$GITHUB_OUTPUT"
            echo "authorized=true" >> "$GITHUB_OUTPUT"
          else
            echo "issue=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
            echo "authorized=${{ steps.auth.outputs.authorized }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git
        if: steps.ctx.outputs.authorized == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Decide mode (draft / revise / question)
        id: mode
        if: steps.ctx.outputs.authorized == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT_BODY: ${{ github.event.comment.body || inputs.comment_body }}
        run: |
          ISSUE=${{ steps.ctx.outputs.issue }}
          OPEN_SPEC=$(gh pr list --repo ${{ github.repository }} \
            --search "head:pm/issue-$ISSUE-" --state open --json number --jq '.[0].number // ""')
          if [[ "$COMMENT_BODY" == /ready* ]]; then
            echo "mode=draft" >> "$GITHUB_OUTPUT"
          elif [ -n "$OPEN_SPEC" ]; then
            echo "mode=revise" >> "$GITHUB_OUTPUT"
          else
            echo "mode=question" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip /ready if spec PR already exists
        id: spec_check
        if: steps.ctx.outputs.authorized == 'true' && steps.mode.outputs.mode == 'draft'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE=${{ steps.ctx.outputs.issue }}
          EXISTING=$(gh pr list --repo ${{ github.repository }} \
            --search "head:pm/issue-$ISSUE-" --state all --json number --jq '.[0].number // ""')
          if [ -n "$EXISTING" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            gh issue comment "$ISSUE" --repo ${{ github.repository }} \
              --body "🤖 Ignored \`/ready\` — spec PR #$EXISTING already exists.
          <sub>🤖 PM · auto</sub><!-- agent-bot -->"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build prompt
        id: load
        if: steps.ctx.outputs.authorized == 'true' && steps.spec_check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT_BODY: ${{ github.event.comment.body || inputs.comment_body }}
        run: |
          MODE="${{ steps.mode.outputs.mode }}"
          case "$MODE" in
            draft)    PROMPT_FILE=.github/prompts/pm-draft-spec.md ;;
            revise)   PROMPT_FILE=.github/prompts/pm-revise-spec.md ;;
            question) PROMPT_FILE=.github/prompts/pm-system.md ;;
          esac
          ISSUE=${{ steps.ctx.outputs.issue }}
          COMMENTS=$(gh issue view "$ISSUE" --comments --json title,body,comments)
          {
            echo 'prompt<<PROMPT_EOF'
            cat "$PROMPT_FILE"
            echo ''
            echo '---'
            echo ''
            echo "RUN_LINK: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "ISSUE NUMBER: $ISSUE"
            echo ''
            echo 'ISSUE + COMMENTS (JSON):'
            echo "$COMMENTS"
            echo ''
            echo "LATEST COMMENT BODY:"
            echo "$COMMENT_BODY"
            echo 'PROMPT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Run Codex (PM agent)
        id: codex
        if: steps.ctx.outputs.authorized == 'true' && steps.spec_check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROMPT: ${{ steps.load.outputs.prompt }}
        run: |
          gh auth setup-git
          .github/scripts/run-codex.sh \
            --cd "$GITHUB_WORKSPACE" \
            --model gpt-5.4 \
            -c model_reasoning_effort="medium" \
            --sandbox danger-full-access \
            --skip-git-repo-check \
            "$PROMPT"

      # Quota block: mark + freeze; agents-recover.yml replays this comment on
      # resume. Wrapper exits 0, so the steps below skip and failure() is silent.
      - name: Mark quota block & freeze
        if: steps.codex.outputs.quota_blocked == 'true'
        env:
          STAGE: pm-followup
          ISSUE: ${{ steps.ctx.outputs.issue }}
          COMMENT_BODY: ${{ github.event.comment.body || inputs.comment_body }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FREEZE_TOKEN: ${{ secrets.AUTO_PAT }}
        run: .github/scripts/mark-quota-blocked.sh

      - name: Auto-merge spec PR (PAT cascade)
        if: success() && steps.ctx.outputs.authorized == 'true' && steps.mode.outputs.mode == 'draft' && steps.spec_check.outputs.skip != 'true' && steps.codex.outputs.quota_blocked != 'true'
        env:
          GH_TOKEN: ${{ secrets.AUTO_PAT }}
          ISSUE: ${{ steps.ctx.outputs.issue }}
        run: .github/scripts/auto-merge-spec.sh

      - name: Post failure comment on error
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ steps.ctx.outputs.issue || github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --body "🤖 PM followup failed (mode=${{ steps.mode.outputs.mode || 'unknown' }}). See: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          <sub>🤖 PM · auto-error</sub><!-- agent-bot -->"

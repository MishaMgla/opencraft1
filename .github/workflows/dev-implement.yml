name: Dev Implement

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      issue:
        description: "Issue number to (re)implement — quota-recovery resume entrypoint"
        required: false
      pr:
        description: "Unused for this stage (kept uniform across agent workflows)"
        required: false
      comment_body:
        description: "Unused for this stage"
        required: false

jobs:
  dev-implement:
    # Three entry points:
    #  (a) a spec PR (head pm/issue-*) merged → implement (write-access gate).
    #  (b) /approved on the issue → implement (author/allowlist gate, applied in
    #      the Authorize step below).
    #  (c) workflow_dispatch → quota-recovery resume (pre-authorized; bypasses the
    #      AGENTS_FREEZE gate so recovery can run while the freeze is being lifted).
    if: |
      github.repository == 'MishaMgla/opencraft1' &&
      vars.AGENTS_FREEZE != 'true' &&
      (
        github.event_name == 'workflow_dispatch' ||
        (
          vars.AGENTS_QUOTA_FREEZE != 'true' &&
          (
            (
              github.event_name == 'pull_request' &&
              github.event.pull_request.merged == true &&
              github.event.pull_request.head.repo.full_name == github.repository &&
              startsWith(github.event.pull_request.head.ref, 'pm/issue-') &&
              !contains(github.event.pull_request.labels.*.name, 'hold') &&
              !contains(github.event.pull_request.labels.*.name, 'needs-human')
            ) ||
            (
              github.event_name == 'issue_comment' &&
              github.event.issue.pull_request == null &&
              startsWith(github.event.comment.body, '/approved') &&
              github.event.comment.user.login != 'github-actions[bot]' &&
              !contains(github.event.comment.body, '<!-- agent-bot -->')
            )
          )
        )
      )
    runs-on: [self-hosted]
    concurrency:
      group: dev-issue-${{ github.event.issue.number || github.event.pull_request.head.ref || inputs.issue }}
      cancel-in-progress: false
    permissions:
      contents: write
      issues: write
      pull-requests: write
      actions: read
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve issue number
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BRANCH="${{ github.event.pull_request.head.ref }}"
            ISSUE=$(echo "$BRANCH" | sed -nE 's|^pm/issue-([0-9]+)-.*|\1|p')
            if [ -z "$ISSUE" ]; then
              echo "Cannot parse issue number from branch '$BRANCH'; aborting." >&2
              exit 1
            fi
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ISSUE="${{ inputs.issue }}"
            if [ -z "$ISSUE" ]; then
              echo "workflow_dispatch resume requires an 'issue' input; aborting." >&2
              exit 1
            fi
          else
            ISSUE="${{ github.event.issue.number }}"
          fi
          echo "issue=$ISSUE" >> "$GITHUB_OUTPUT"

      # Comment-path only: author/allowlist gate. The pull_request (spec-merge)
      # path is already gated by write-access-to-merge, so it skips this.
      - name: Authorize (comment path)
        id: auth
        if: github.event_name == 'issue_comment'
        env:
          ACTOR: ${{ github.event.comment.user.login }}
          OWNER_ISSUE: ${{ steps.resolve.outputs.issue }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: .github/scripts/authorize.sh

      - name: Compute proceed + guard duplicates
        id: guard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Authorization: pull_request path always ok; comment path needs auth=true.
          if [ "${{ github.event_name }}" = "issue_comment" ] && [ "${{ steps.auth.outputs.authorized }}" != "true" ]; then
            gh issue comment "${{ steps.resolve.outputs.issue }}" --repo ${{ github.repository }} \
              --body "🤖 Only a maintainer with write access (or an allowlisted maintainer) can /approved this issue. Ignoring.
          <sub>🤖 Dev · auth</sub><!-- agent-bot -->"
            echo "proceed=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          # Duplicate guard: if an impl PR is already open for this issue, an
          # issue-level /approved (or a quota-recovery resume) must NOT spin up a
          # fresh implementation. Runs for every entrypoint except the spec-merge
          # pull_request path (whose whole purpose is to start implementation).
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            ISSUE=${{ steps.resolve.outputs.issue }}
            EXISTING=$(gh pr list --repo ${{ github.repository }} --state open \
              --json number,headRefName \
              --jq "[.[] | select(.headRefName | startswith(\"codex/issue-${ISSUE}-\"))] | .[0].number // \"\"")
            if [ -n "$EXISTING" ]; then
              gh issue comment "$ISSUE" --repo ${{ github.repository }} \
                --body "🤖 Impl PR #$EXISTING is already open for this issue. To merge it, comment \`/approved\` on the PR.
          <sub>🤖 Dev · auto</sub><!-- agent-bot -->"
              echo "proceed=false" >> "$GITHUB_OUTPUT"; exit 0
            fi
          fi
          echo "proceed=true" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        if: steps.guard.outputs.proceed == 'true'
        with:
          node-version: '20'

      - name: Install deps if present
        if: steps.guard.outputs.proceed == 'true'
        run: |
          if [ -f package.json ]; then
            corepack enable || true
            if [ -f yarn.lock ]; then yarn install --frozen-lockfile;
            elif [ -f package-lock.json ]; then npm ci;
            else npm install; fi
          else
            echo "No package.json — scaffold, skipping install."
          fi

      - name: Build prompt
        id: load
        if: steps.guard.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE=${{ steps.resolve.outputs.issue }}
          COMMENTS=$(gh issue view "$ISSUE" --comments --json title,body,comments)
          {
            echo 'prompt<<PROMPT_EOF'
            cat .github/prompts/dev-system.md
            echo ''
            echo '---'
            echo ''
            echo "RUN_LINK: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "ISSUE NUMBER: $ISSUE"
            echo 'ISSUE + COMMENTS (JSON):'
            echo "$COMMENTS"
            echo 'PROMPT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Run Codex (Dev agent)
        id: codex
        if: steps.guard.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROMPT: ${{ steps.load.outputs.prompt }}
          PIXELLAB_API_KEY: ${{ secrets.PIXELLAB_API_KEY }}
        run: |
          gh auth setup-git
          .github/scripts/run-codex.sh \
            --cd "$GITHUB_WORKSPACE" \
            --model gpt-5.5 \
            -c model_reasoning_effort="high" \
            --sandbox danger-full-access \
            --skip-git-repo-check \
            "$PROMPT"

      # Quota block: mark the issue + freeze the pipeline. The recovery cron
      # (agents-recover.yml) re-dispatches this stage once quota returns. The
      # wrapper exits 0 here, so the post-codex steps below are gated off and the
      # failure() path does not fire.
      - name: Mark quota block & freeze
        if: steps.codex.outputs.quota_blocked == 'true'
        env:
          STAGE: dev-implement
          ISSUE: ${{ steps.resolve.outputs.issue }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FREEZE_TOKEN: ${{ secrets.AUTO_PAT }}
        run: .github/scripts/mark-quota-blocked.sh

      - name: Resolve impl PR
        id: implpr
        if: success() && steps.guard.outputs.proceed == 'true' && steps.codex.outputs.quota_blocked != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE=${{ steps.resolve.outputs.issue }}
          PRJSON=$(gh pr list --repo ${{ github.repository }} --state open \
            --json number,headRefName,labels \
            --jq "[.[] | select(.headRefName | startswith(\"codex/issue-${ISSUE}-\"))] | .[0] // {}")
          PR=$(echo "$PRJSON" | jq -r '.number // ""')
          LABELS=$(echo "$PRJSON" | jq -r '([.labels[].name] // []) | join(",")')
          echo "pr=$PR" >> "$GITHUB_OUTPUT"
          if [ -n "$PR" ] && [[ ",$LABELS," != *",needs-human,"* ]] && [[ ",$LABELS," != *",hold,"* ]]; then
            echo "gate=true" >> "$GITHUB_OUTPUT"
          else
            echo "gate=false" >> "$GITHUB_OUTPUT"
            echo "Skipping gate: pr='$PR' labels='$LABELS' (agent escalated or no PR)."
          fi

      - name: Verification gate
        if: steps.implpr.outputs.gate == 'true'
        run: .github/scripts/run-gates.sh

      # Keystone (docs/security-architecture.md #3/#4): classify the impl diff's
      # capabilities INLINE — agent PRs are opened with GITHUB_TOKEN, which does
      # not trigger the pull_request policy-gate workflow, so the gate that guards
      # auto-merge must run here, like run-gates.sh. Tier B holds for a human.
      - name: Capability gate (Tier)
        id: capgate
        if: steps.implpr.outputs.gate == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: .github/scripts/capability-gate-pr.sh ${{ steps.implpr.outputs.pr }}

      - name: Hold Tier B for human
        if: steps.implpr.outputs.gate == 'true' && steps.capgate.outputs.tier != 'A'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ steps.implpr.outputs.pr }}
          gh pr edit "$PR" --repo ${{ github.repository }} --add-label needs-human || true
          gh pr comment "$PR" --repo ${{ github.repository }} --body "🤖 Capability gate: **Tier B** — this diff introduces capabilities that need human review before merge (see the run summary). Not auto-merging. A maintainer can review and merge.
          <sub>🤖 Dev · capability-gate</sub><!-- agent-bot -->"

      - name: Auto-merge on green
        if: steps.implpr.outputs.gate == 'true' && steps.capgate.outputs.tier == 'A'
        env:
          GH_TOKEN: ${{ secrets.AUTO_PAT }}
        run: |
          PR=${{ steps.implpr.outputs.pr }}
          gh pr comment "$PR" --repo ${{ github.repository }} --body "🤖 Gates passed. Merging to main.
          <sub>🤖 Dev · ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}</sub><!-- agent-bot -->"
          gh pr merge "$PR" --repo ${{ github.repository }} --squash --delete-branch

      - name: Post failure comment on error
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ steps.resolve.outputs.issue }} \
            --repo ${{ github.repository }} \
            --body "🤖 Dev run failed. See: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          <sub>🤖 Dev · auto-error</sub><!-- agent-bot -->"
